name: Upload development package to PyPI from develop

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  pypi-publish-dev:
    name: Publish dev release to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi-dev
      url: https://pypi.org/p/terndata.ecoplots
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build packaging setuptools wheel
      - name: Set dev version
        run: |
          LATEST_TAG="$(git describe --tags --abbrev=0 2>/dev/null || echo 0.0.0)"
          BASE_VERSION="${LATEST_TAG#v}"
          DEV_VERSION="$(python .github/workflows/scripts/next_dev_version.py "$BASE_VERSION" "$GITHUB_RUN_NUMBER")"
          echo "SETUPTOOLS_SCM_PRETEND_VERSION=$DEV_VERSION" >> "$GITHUB_ENV"
          echo "Building terndata.ecoplots $DEV_VERSION"
      - name: Build package
        run: python -m build
      - name: Publish development distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
